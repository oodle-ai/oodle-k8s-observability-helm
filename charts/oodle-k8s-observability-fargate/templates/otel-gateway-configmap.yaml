{{- if .Values.otelGateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oodle-fargate.gatewayServiceName" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oodle-fargate.gatewayLabels" . | nindent 4 }}
data:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters:
    - name: in-cluster
      cluster:
        server: https://kubernetes.default.svc:443
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    contexts:
    - name: in-cluster
      context: { cluster: in-cluster, user: in-cluster }
    current-context: in-cluster
    users:
    - name: in-cluster
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

  otel-gateway-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.otelGateway.service.otlpGrpcPort }}
            max_recv_msg_size_mib: 4
          http:
            endpoint: 0.0.0.0:{{ .Values.otelGateway.service.otlpHttpPort }}

      {{- if .Values.otelGateway.k8sCluster.enabled }}
      k8s_cluster:
        auth_type: serviceAccount
        collection_interval: {{ .Values.otelGateway.k8sCluster.collectionInterval }}
        node_conditions_to_report:
        {{- range .Values.otelGateway.k8sCluster.nodeConditionsToReport }}
        - {{ . }}
        {{- end }}
        allocatable_types_to_report:
        {{- range .Values.otelGateway.k8sCluster.allocatableTypesToReport }}
        - {{ . }}
        {{- end }}
      {{- end }}

      {{- if .Values.otelGateway.prometheusReceiver.enabled }}
      prometheus:
        config:
          scrape_configs:
            - job_name: kubelet-cadvisor
              honor_labels: true
              scheme: https
              scrape_interval: {{ .Values.otelGateway.prometheusReceiver.scrapeInterval }}
              kubernetes_sd_configs:
                - role: node
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              tls_config:
                insecure_skip_verify: true
              relabel_configs:
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node
      {{- end }}

    processors:
      batch:
        send_batch_size: {{ .Values.otelGateway.batch.sendBatchSize }}
        timeout: {{ .Values.otelGateway.batch.timeout }}

      k8sattributes:
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection

      resourcedetection:
        detectors:
        - eks
        - env
        - system
        override: false
        system:
          resource_attributes:
            host.id:
              enabled: false
            host.name:
              enabled: false
            os.type:
              enabled: true
        timeout: 2s

    exporters:
      otlphttp/oodle:
        endpoint: ${env:OODLE_OTLP_HOST}
        headers:
          X-OODLE-INSTANCE: ${env:OODLE_INSTANCE}
          X-API-KEY: ${env:OODLE_API_KEY}
        timeout: {{ .Values.otelGateway.export.timeout }}
        {{- if .Values.otelGateway.export.retry.enabled }}
        retry_on_failure:
          enabled: true
          initial_interval: {{ .Values.otelGateway.export.retry.initialInterval }}
          max_interval: {{ .Values.otelGateway.export.retry.maxInterval }}
          max_elapsed_time: {{ .Values.otelGateway.export.retry.maxElapsedTime }}
        {{- end }}

      debug:
        sampling_initial: 2
        sampling_thereafter: 500
        verbosity: basic

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers:
            - otlp
            {{- if .Values.otelGateway.k8sCluster.enabled }}
            - k8s_cluster
            {{- end }}
            {{- if .Values.otelGateway.prometheusReceiver.enabled }}
            - prometheus
            {{- end }}
          processors: [resourcedetection, k8sattributes, batch]
          exporters: [otlphttp/oodle, debug]
        {{- if .Values.traces.enabled }}
        traces:
          receivers: [otlp]
          processors: [resourcedetection, k8sattributes, batch]
          exporters: [otlphttp/oodle, debug]
        {{- end }}
      telemetry:
        logs:
          encoding: json
{{- end }}
